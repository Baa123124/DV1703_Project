{% extends "base.html" %}
{% block content %}
<div class="max-w-3xl bg-white border rounded-xl p-6 shadow-sm">
  <h2 class="text-xl font-semibold">Edit category #{{ cat.id }}</h2>
  <p class="text-sm text-slate-500 mt-1">Edits affect all units in this category.</p>

  <form method="post" class="mt-4 grid grid-cols-1 md:grid-cols-2 gap-4">
    <div class="md:col-span-2"><h3 class="font-medium">Base</h3></div>

    <div>
      <label class="text-sm font-medium">Display name</label>
      <input name="display_name" value="{{ cat.display_name }}" required class="mt-1 w-full rounded-lg border px-3 py-2">
    </div>

    <div>
      <label class="text-sm font-medium">Daily rate</label>
      <input name="daily_rate" type="number" step="0.01" value="{{ cat.daily_rate }}" required class="mt-1 w-full rounded-lg border px-3 py-2">
    </div>

    {% if cat.is_tent %}
      <div class="md:col-span-2 mt-2"><h3 class="font-medium">Tent details</h3></div>

      <div><label class="text-sm font-medium">Capacity</label>
        <input name="capacity" type="number" min="1" value="{{ cat.capacity }}" required class="mt-1 w-full rounded-lg border px-3 py-2"></div>

      <div><label class="text-sm font-medium">Season rating (1–5)</label>
        <input name="season_rating" type="number" min="1" max="5" value="{{ cat.season_rating }}" required class="mt-1 w-full rounded-lg border px-3 py-2"></div>

      <div><label class="text-sm font-medium">Build time (minutes)</label>
        <input name="estimated_build_time_minutes" type="number" min="0" value="{{ cat.estimated_build_time_minutes }}" required class="mt-1 w-full rounded-lg border px-3 py-2"></div>

      <div><label class="text-sm font-medium">Construction cost</label>
        <input name="construction_cost" type="number" step="0.01" min="0" value="{{ cat.construction_cost }}" required class="mt-1 w-full rounded-lg border px-3 py-2"></div>

      <div><label class="text-sm font-medium">Deconstruction cost</label>
        <input name="deconstruction_cost" type="number" step="0.01" min="0" value="{{ cat.deconstruction_cost }}" required class="mt-1 w-full rounded-lg border px-3 py-2"></div>

      <div><label class="text-sm font-medium">Packed weight (kg) (optional)</label>
        <input name="packed_weight_kg" type="number" step="0.01" min="0" value="{{ cat.packed_weight_kg or '' }}" class="mt-1 w-full rounded-lg border px-3 py-2"></div>

      <div><label class="text-sm font-medium">Floor area (m²) (optional)</label>
        <input name="floor_area_m2" type="number" step="0.01" min="0" value="{{ cat.floor_area_m2 or '' }}" class="mt-1 w-full rounded-lg border px-3 py-2"></div>

    {% else %}
      <div class="md:col-span-2 mt-2"><h3 class="font-medium">Furnishing details</h3></div>

      <div><label class="text-sm font-medium">Kind</label>
        <input name="furnishing_kind" value="{{ cat.furnishing_kind }}" required class="mt-1 w-full rounded-lg border px-3 py-2"></div>

      <div><label class="text-sm font-medium">Weight (kg) (optional)</label>
        <input name="weight_kg" type="number" step="0.01" min="0" value="{{ cat.weight_kg or '' }}" class="mt-1 w-full rounded-lg border px-3 py-2"></div>

      <div class="md:col-span-2"><label class="text-sm font-medium">Notes (optional)</label>
        <textarea name="notes" rows="3" class="mt-1 w-full rounded-lg border px-3 py-2">{{ cat.notes or '' }}</textarea></div>
    {% endif %}

    <div class="md:col-span-2 flex gap-2 mt-2">
      <button class="rounded-lg bg-indigo-600 text-white px-4 py-2 hover:bg-indigo-700">Save</button>
      <a class="rounded-lg border px-4 py-2 hover:bg-slate-50" href="{{ url_for('routes.admin_categories') }}">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
