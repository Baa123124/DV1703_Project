{% extends "base.html" %}
{% block content %}
<div class="max-w-3xl bg-white border rounded-xl p-6 shadow-sm">
  <h2 class="text-xl font-semibold">Add tent item</h2>

  <form method="post" class="mt-4 grid grid-cols-1 md:grid-cols-2 gap-4">
    <div class="md:col-span-2">
      <h3 class="font-medium">Base item</h3>
    </div>

    <div>
      <label class="text-sm font-medium">SKU</label>
      <input name="sku" required class="mt-1 w-full rounded-lg border px-3 py-2">
    </div>

    <div>
      <label class="text-sm font-medium">Display name</label>
      <input name="display_name" required class="mt-1 w-full rounded-lg border px-3 py-2">
    </div>

    <div>
      <label class="text-sm font-medium">Daily rate</label>
      <input name="daily_rate" type="number" step="0.01" required class="mt-1 w-full rounded-lg border px-3 py-2">
    </div>

    <div class="md:col-span-2 mt-2">
      <h3 class="font-medium">Tent details</h3>
    </div>

    <div>
      <label class="text-sm font-medium">Capacity</label>
      <input name="capacity" type="number" min="1" required class="mt-1 w-full rounded-lg border px-3 py-2">
    </div>

    <div>
      <label class="text-sm font-medium">Season rating (1–5)</label>
      <input name="season_rating" type="number" min="1" max="5" required class="mt-1 w-full rounded-lg border px-3 py-2">
    </div>

    <div>
      <label class="text-sm font-medium">Estimated build time (minutes)</label>
      <input name="estimated_build_time_minutes" type="number" min="0" value="10" required class="mt-1 w-full rounded-lg border px-3 py-2">
    </div>

    <div>
      <label class="text-sm font-medium">Construction cost (setup fee)</label>
      <input name="construction_cost" type="number" step="0.01" min="0" value="0" required class="mt-1 w-full rounded-lg border px-3 py-2">
    </div>

    <div>
      <label class="text-sm font-medium">Deconstruction cost (teardown fee)</label>
      <input name="deconstruction_cost" type="number" step="0.01" min="0" value="0" required class="mt-1 w-full rounded-lg border px-3 py-2">
    </div>

    <div>
      <label class="text-sm font-medium">Packed weight (kg) (optional)</label>
      <input name="packed_weight_kg" type="number" step="0.01" min="0" class="mt-1 w-full rounded-lg border px-3 py-2">
    </div>

    <div>
      <label class="text-sm font-medium">Floor area (m²) (optional)</label>
      <input name="floor_area_m2" type="number" step="0.01" min="0" class="mt-1 w-full rounded-lg border px-3 py-2">
    </div>

    <div class="md:col-span-2">
      <button class="rounded-lg bg-indigo-600 text-white px-4 py-2 hover:bg-indigo-700">
        Create
      </button>
    </div>
  </form>
</div>
{% endblock %}
